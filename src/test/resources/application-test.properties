spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
jwt.secret=VGVzdFNlY3JldEtleUZvckpXVDI1NkJpdHMhISEhISE=
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000
jwt.remember-me-refresh-expiration=2592000000
jwt.reset-password-token-expiration=900000
jwt.verify-email-token-expiration=900000
cookie.access-token-name=access_token
cookie.refresh-token-name=refresh_token
cookie.path=/
cookie.secure=false
cors.allowed-origins=http://localhost:5173
resend.api-key=test-key
resend.from=test@test.com
app.base-url=http://localhost:5173
server.port=0
server.forward-headers-strategy=framework
resilience4j.ratelimiter.instances.login-password.limit-for-period=10000
resilience4j.ratelimiter.instances.login-password.limit-refresh-period=1m
resilience4j.ratelimiter.instances.forgot-password.limit-for-period=10000
resilience4j.ratelimiter.instances.forgot-password.limit-refresh-period=1h
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.orm.jpa=TRACE
logging.level.org.springframework.transaction=TRACE

