spring.application.name=sgc

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}?prepareThreshold=0
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000
jwt.remember-me-refresh-expiration=2592000000
jwt.reset-password-token-expiration=900000
jwt.verify-email-token-expiration=900000

cookie.access-token-name=access_token
cookie.refresh-token-name=refresh_token
cookie.path=/
cookie.secure=true

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

resend.api-key=${RESEND_API_KEY}
resend.from=${MAIL_FROM}

app.base-url=${APP_BASE_URL}

springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/docs/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

server.port=${PORT}
